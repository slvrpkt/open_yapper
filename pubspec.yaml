name: open_yapper
description: "The GEN Z voice dictation app. Ramble naturally, AI cleans the mess—no cap. Open-source WhisperFlow alternative that transcribes speech, removes filler words, and turns your thoughts into polished text. Stop typing, start talking."
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2906.0
  shared_preferences: ^2.2.2
  record: ^6.0.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.0
  http: ^1.2.0
  intl: ^0.19.0
  url_launcher: ^6.2.0
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
